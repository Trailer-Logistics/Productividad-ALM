<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Productividad ALM | Trailer Logistics</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

    <!-- PropTypes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

    <!-- Babel Standalone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F2F2F5;
            color: #192853;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background-color: #192853;
            color: #FFFEFF;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-box {
            background-color: #0E245E;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            border: 2px solid #10B981;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links li a {
            color: #AEAEB8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .nav-links li a:hover {
            color: #FFFEFF;
        }

        .nav-links li a.active {
            color: #10B981;
            border-bottom: 2px solid #10B981;
            padding-bottom: 0.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #AEAEB8;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #10B981;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #192853;
        }

        /* Filters Bar */
        .filters-bar {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5E6373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input,
        .filter-group select {
            padding: 0.75rem;
            border: 1px solid #AEAEB8;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #192853;
            background-color: #FFFEFF;
            transition: border-color 0.3s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #0E245E;
            box-shadow: 0 0 0 3px rgba(14, 36, 94, 0.1);
        }

        .filter-group input::placeholder {
            color: #AEAEB8;
        }

        .btn-apply {
            padding: 0.75rem 1.5rem;
            background-color: #0E245E;
            color: #FFFEFF;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .btn-apply:hover {
            background-color: #192853;
            transform: translateY(-2px);
        }

        .btn-apply:active {
            transform: translateY(0);
        }

        /* KPI Cards */
        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #0E245E;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .kpi-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5E6373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            color: #192853;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .kpi-subtitle {
            font-size: 0.8rem;
            color: #AEAEB8;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #192853;
            margin-bottom: 1rem;
        }

        .chart-container {
            width: 100%;
            height: 300px;
        }

        .chart-container-large {
            width: 100%;
            height: 500px;
        }

        /* Table */
        .table-section {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-search {
            flex: 1;
            min-width: 200px;
        }

        .table-search input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #AEAEB8;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .table-search input:focus {
            outline: none;
            border-color: #0E245E;
            box-shadow: 0 0 0 3px rgba(14, 36, 94, 0.1);
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        .ranking-table thead {
            background-color: #F2F2F5;
            border-bottom: 2px solid #AEAEB8;
        }

        .ranking-table {
            font-size: 0.85rem;
        }

        .ranking-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #5E6373;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ranking-table td {
            padding: 1rem;
            border-bottom: 1px solid #F2F2F5;
            font-size: 0.95rem;
            color: #192853;
        }

        .ranking-table tbody tr:nth-child(odd) {
            background-color: #F2F2F5;
        }

        .ranking-table tbody tr:hover {
            background-color: #FFFEFF;
            box-shadow: inset 0 0 0 1px #AEAEB8;
        }

        .rank-number {
            font-weight: 700;
            color: #0E245E;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
        }

        .operator-name {
            font-weight: 600;
            color: #192853;
        }

        .cargo-badge {
            display: inline-block;
            background-color: #0E245E;
            color: #FFFEFF;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .mono-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .pagination button,
        .pagination span {
            padding: 0.5rem 0.75rem;
            border: 1px solid #AEAEB8;
            background-color: #FFFEFF;
            color: #192853;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }

        .pagination button:hover:not(:disabled) {
            background-color: #0E245E;
            color: #FFFEFF;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .active {
            background-color: #0E245E;
            color: #FFFEFF;
            border-color: #0E245E;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #F2F2F5 25%, #AEAEB8 50%, #F2F2F5 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-card {
            height: 120px;
            margin-bottom: 1rem;
        }

        .skeleton-chart {
            height: 300px;
            margin-bottom: 2rem;
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 2rem;
            color: #AEAEB8;
        }

        .no-data-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .container {
                padding: 0 1rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .filters-bar {
                grid-template-columns: 1fr;
            }

            .kpi-section {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }

            .table-search {
                min-width: auto;
            }

            .ranking-table th,
            .ranking-table td {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }

            .kpi-value {
                font-size: 1.5rem;
            }
        }

        .error-message {
            background-color: #FEE2E2;
            color: #DC2626;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #DC2626;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell, ReferenceLine } = window.Recharts;

        // Supabase Configuration
        const SUPABASE_URL = 'https://xcmpuyjoidexrgpnotkj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjbXB1eWpvaWRleHJncG5vdGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjYxOTQsImV4cCI6MjA4ODc0MjE5NH0.F8QeJldEz8QLBkbtCZ6a78zK27iSDnpgNqtnJLDuWN4';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Utility Functions
        const formatChileanNumber = (num) => {
            return num.toLocaleString('es-CL', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        };

        const formatDate = (dateString) => {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-CL', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        };

        // KPI Card Component
        const KPICard = ({ label, value, subtitle }) => (
            <div className="kpi-card">
                <div className="kpi-label">{label}</div>
                <div className="kpi-value">{value}</div>
                {subtitle && <div className="kpi-subtitle">{subtitle}</div>}
            </div>
        );

        // Header Component
        const Header = () => (
            <header className="header">
                <div className="header-left">
                    <div className="logo-box">TL</div>
                    <h1 className="header-title">TRAILER LOGISTICS</h1>
                </div>
                <nav>
                    <ul className="nav-links">
                        <li><a href="index.html">Carga</a></li>
                        <li><a href="dashboard.html" className="active">Dashboard</a></li>
                        <li><a href="operarios.html">Operarios</a></li>
                    </ul>
                </nav>
                <div className="header-right">
                    <div className="connection-status">
                        <span className="status-dot"></span>
                        <span>Conectado</span>
                    </div>
                </div>
            </header>
        );

        // Loading Skeleton Component
        const LoadingSkeleton = () => (
            <div className="container">
                <div style={{ marginBottom: '2rem' }}>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                </div>
                <div style={{ marginBottom: '2rem' }}>
                    <div className="skeleton skeleton-chart"></div>
                    <div className="skeleton skeleton-chart"></div>
                </div>
            </div>
        );

        // Ranking Table Component
        const RankingTable = ({ data, currentPage, itemsPerPage, onPageChange, searchTerm, onSearchChange, isDaily }) => {
            const filteredData = useMemo(() => {
                return data.filter(item =>
                    item.nombre.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [data, searchTerm]);

            const paginatedData = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredData.slice(start, start + itemsPerPage);
            }, [filteredData, currentPage, itemsPerPage]);

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);

            return (
                <div className="table-section">
                    <div className="table-header">
                        <h2 style={{ marginBottom: 0 }}>Ranking de Operarios</h2>
                        <div className="table-search">
                            <input
                                type="text"
                                placeholder="Buscar por nombre..."
                                value={searchTerm}
                                onChange={(e) => {
                                    onSearchChange(e.target.value);
                                    onPageChange(1);
                                }}
                            />
                        </div>
                    </div>

                    {filteredData.length === 0 ? (
                        <div className="no-data">
                            <div className="no-data-icon">📭</div>
                            <p>No hay datos disponibles</p>
                        </div>
                    ) : (
                        <>
                            <table className="ranking-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Operario</th>
                                        <th>Cargo</th>
                                        <th>Prom. Pallets/Hora</th>
                                        <th>{isDaily ? 'Dias Trab.' : 'Semanas Trab.'}</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {paginatedData.map((item, idx) => (
                                        <tr key={item.nombre}>
                                            <td><span className="rank-number">{(currentPage - 1) * itemsPerPage + idx + 1}</span></td>
                                            <td><span className="operator-name">{item.nombre}</span></td>
                                            <td><span className="cargo-badge">{item.cargo}</span></td>
                                            <td><span className="mono-value">{formatChileanNumber(item.productividad_promedio)}</span></td>
                                            <td><span className="mono-value">{item.periodos_trabajados}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button
                                        onClick={() => onPageChange(Math.max(1, currentPage - 1))}
                                        disabled={currentPage === 1}
                                    >
                                        ← Anterior
                                    </button>
                                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => (
                                        <button
                                            key={page}
                                            onClick={() => onPageChange(page)}
                                            className={page === currentPage ? 'active' : ''}
                                        >
                                            {page}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => onPageChange(Math.min(totalPages, currentPage + 1))}
                                        disabled={currentPage === totalPages}
                                    >
                                        Siguiente →
                                    </button>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        // Main Dashboard Component
        const Dashboard = () => {
            const [weeklyData, setWeeklyData] = useState([]);
            const [dailyData, setDailyData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [selectedCargo, setSelectedCargo] = useState('Todos');
            const [selectedOperario, setSelectedOperario] = useState('Todos');
            const [periodView, setPeriodView] = useState('Semanal');
            const [currentPage, setCurrentPage] = useState(1);
            const [searchTerm, setSearchTerm] = useState('');
            const [excludeWeekends, setExcludeWeekends] = useState(true);
            const [recalculating, setRecalculating] = useState(false);

            // Recalcular productividad desde la vista (incluye minutas)
            const handleRecalculate = async () => {
                if (recalculating) return;
                try {
                    setRecalculating(true);
                    // Rango amplio para cubrir toda la data
                    const { data: d1, error: e1 } = await supabase.rpc('fn_3_guardar_productividad', {
                        p_fecha_desde: '2026-01-01',
                        p_fecha_hasta: '2026-12-31'
                    });
                    if (e1) throw e1;

                    const { data: d2, error: e2 } = await supabase.rpc('fn_3_actualizar_productividad_semanal', {
                        p_fecha_desde: '2026-01-01',
                        p_fecha_hasta: '2026-12-31'
                    });
                    if (e2) throw e2;

                    // Refrescar datos
                    const [weeklyRes, dailyRes] = await Promise.all([
                        supabase.from('3-productividad_semanal').select('*').order('anio', { ascending: true }).order('semana', { ascending: true }),
                        supabase.from('3-productividad_final').select('*').order('dia', { ascending: true })
                    ]);
                    if (weeklyRes.error) throw weeklyRes.error;
                    if (dailyRes.error) throw dailyRes.error;
                    setWeeklyData(weeklyRes.data || []);
                    setDailyData(dailyRes.data || []);
                    alert('Productividad recalculada: ' + (d1 || 0) + ' registros diarios, ' + (d2 || 0) + ' semanales.');
                } catch (err) {
                    console.error('Error recalculando:', err);
                    alert('Error al recalcular: ' + (err.message || err));
                } finally {
                    setRecalculating(false);
                }
            };

            // Helper: get approximate date from year + week number
            const weekToDate = (anio, semana) => {
                const jan1 = new Date(anio, 0, 1);
                const days = (semana - 1) * 7;
                const weekStart = new Date(jan1.getTime() + days * 86400000);
                const day = weekStart.getDay();
                const diff = day === 0 ? -6 : 1 - day;
                weekStart.setDate(weekStart.getDate() + diff);
                return weekStart.toISOString().split('T')[0];
            };

            const mesToNum = {'Enero':1,'Febrero':2,'Marzo':3,'Abril':4,'Mayo':5,'Junio':6,'Julio':7,'Agosto':8,'Septiembre':9,'Octubre':10,'Noviembre':11,'Diciembre':12};

            // Fetch Data on Mount — dual source: daily + weekly
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        setError(null);

                        // Fetch both tables in parallel
                        const [weeklyRes, dailyRes] = await Promise.all([
                            supabase
                                .from('3-productividad_semanal')
                                .select('*')
                                .order('anio', { ascending: true })
                                .order('semana', { ascending: true }),
                            supabase
                                .from('3-productividad_final')
                                .select('*')
                                .order('dia', { ascending: true })
                        ]);

                        if (weeklyRes.error) throw weeklyRes.error;
                        if (dailyRes.error) throw dailyRes.error;

                        setWeeklyData(weeklyRes.data || []);
                        setDailyData(dailyRes.data || []);

                        // Set default date range covering ALL data (weekly has more history)
                        const allDates = [];
                        (weeklyRes.data || []).forEach(d => allDates.push(weekToDate(d.anio, d.semana)));
                        (dailyRes.data || []).forEach(d => allDates.push(d.dia));
                        allDates.sort();
                        if (allDates.length > 0) {
                            setDateFrom(allDates[0]);
                            setDateTo(allDates[allDates.length - 1]);
                        }
                    } catch (err) {
                        console.error('Error fetching data:', err);
                        setError('Error al cargar los datos. Por favor, intente nuevamente.');
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            // Determine active data source based on period view
            const isDaily = periodView === 'Diario';
            const sourceData = isDaily ? dailyData : weeklyData;

            // Filter data
            const filteredData = useMemo(() => {
                return sourceData.filter(item => {
                    const itemDate = isDaily
                        ? new Date(item.dia + 'T12:00:00')
                        : new Date(weekToDate(item.anio, item.semana));
                    const fromDate = dateFrom ? new Date(dateFrom) : null;
                    const toDate = dateTo ? new Date(dateTo) : null;

                    if (fromDate && itemDate < fromDate) return false;
                    if (toDate && itemDate > toDate) return false;
                    if (selectedCargo !== 'Todos' && item.cargo !== selectedCargo) return false;
                    if (selectedOperario !== 'Todos' && item.nombre !== selectedOperario) return false;

                    // Excluir fines de semana en vista diaria
                    if (isDaily && excludeWeekends) {
                        const dayOfWeek = itemDate.getDay(); // 0=domingo, 6=sabado
                        if (dayOfWeek === 0 || dayOfWeek === 6) return false;
                    }

                    return true;
                });
            }, [sourceData, isDaily, dateFrom, dateTo, selectedCargo, selectedOperario, excludeWeekends]);

            // Calculate KPIs
            const kpis = useMemo(() => {
                if (filteredData.length === 0) {
                    return { avgProductivity: 0, activeOperators: 0, periodCount: 0 };
                }

                const prodField = isDaily ? 'productividad_hora' : 'productividad';
                let prodSum = 0, prodCount = 0;
                filteredData.forEach(item => { prodSum += parseFloat(item[prodField] || 0); prodCount++; });
                const avgProductivity = prodCount > 0 ? prodSum / prodCount : 0;

                const ops = new Set();
                filteredData.forEach(item => ops.add(item.nombre));
                const activeOperators = ops.size;

                const periods = new Set();
                if (isDaily) {
                    filteredData.forEach(item => periods.add(item.dia));
                } else {
                    filteredData.forEach(item => periods.add('S' + item.semana + '-' + item.anio));
                }
                const periodCount = periods.size;

                return { avgProductivity, activeOperators, periodCount };
            }, [filteredData, isDaily]);

            // Prepare Chart Data - Tendencia (diario, semanal o mensual)
            const tendenciaData = useMemo(() => {
                const grouped = {};
                const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
                const prodField = isDaily ? 'productividad_hora' : 'productividad';

                filteredData.forEach(item => {
                    let key, label;
                    if (isDaily) {
                        key = item.dia;
                        const d = new Date(item.dia + 'T12:00:00');
                        label = d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' });
                    } else if (periodView === 'Mensual') {
                        const mesNum = mesToNum[item.mes] || 0;
                        key = item.anio + '-' + String(mesNum).padStart(2, '0');
                        label = meses[mesNum] + ' ' + item.anio;
                    } else {
                        key = item.anio + '-S' + String(item.semana).padStart(2, '0');
                        label = 'S' + item.semana + ' ' + item.anio;
                    }
                    if (!grouped[key]) grouped[key] = { key, label, productividad: 0, count: 0 };
                    grouped[key].productividad += parseFloat(item[prodField] || 0);
                    grouped[key].count += 1;
                });

                return Object.values(grouped)
                    .sort((a, b) => a.key.localeCompare(b.key))
                    .map(item => ({
                        fecha: item.label,
                        'Pallets/Hora': parseFloat((item.productividad / item.count).toFixed(2))
                    }));
            }, [filteredData, periodView, isDaily]);

            // Prepare Chart Data - Tendencia por Cargo (líneas)
            const CARGO_COLORS = ['#0E245E', '#10B981', '#EF4444', '#F59E0B', '#8B5CF6', '#EC4899', '#06B6D4', '#84CC16'];
            const tendenciaCargoData = useMemo(() => {
                const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
                const prodField = isDaily ? 'productividad_hora' : 'productividad';
                const grouped = {};
                const cargosSet = new Set();

                filteredData.forEach(item => {
                    let key, label;
                    if (isDaily) {
                        key = item.dia;
                        const d = new Date(item.dia + 'T12:00:00');
                        label = d.toLocaleDateString('es-CL', { day: '2-digit', month: '2-digit' });
                    } else if (periodView === 'Mensual') {
                        const mesNum = mesToNum[item.mes] || 0;
                        key = item.anio + '-' + String(mesNum).padStart(2, '0');
                        label = meses[mesNum] + ' ' + item.anio;
                    } else {
                        key = item.anio + '-S' + String(item.semana).padStart(2, '0');
                        label = 'S' + item.semana + ' ' + item.anio;
                    }
                    const cargo = item.cargo || 'Sin Cargo';
                    cargosSet.add(cargo);
                    if (!grouped[key]) grouped[key] = { key, fecha: label };
                    if (!grouped[key]['_' + cargo]) grouped[key]['_' + cargo] = { sum: 0, count: 0 };
                    grouped[key]['_' + cargo].sum += parseFloat(item[prodField] || 0);
                    grouped[key]['_' + cargo].count += 1;
                });

                const cargos = Array.from(cargosSet).sort();
                const data = Object.values(grouped)
                    .sort((a, b) => a.key.localeCompare(b.key))
                    .map(item => {
                        const row = { fecha: item.fecha };
                        cargos.forEach(c => {
                            const d = item['_' + c];
                            row[c] = d ? parseFloat((d.sum / d.count).toFixed(2)) : null;
                        });
                        return row;
                    });

                return { data, cargos };
            }, [filteredData, periodView, isDaily]);

            // Prepare Ranking Data
            const rankingData = useMemo(() => {
                const prodField = isDaily ? 'productividad_hora' : 'productividad';
                const groupedByOperator = {};
                filteredData.forEach(item => {
                    const key = item.nombre;
                    if (!groupedByOperator[key]) {
                        groupedByOperator[key] = { nombre: item.nombre, cargo: item.cargo, productividad: 0, periodos: new Set(), count: 0 };
                    }
                    groupedByOperator[key].productividad += parseFloat(item[prodField] || 0);
                    if (isDaily) {
                        groupedByOperator[key].periodos.add(item.dia);
                    } else {
                        groupedByOperator[key].periodos.add('S' + item.semana + '-' + item.anio);
                    }
                    groupedByOperator[key].count += 1;
                });
                return Object.values(groupedByOperator)
                    .map(item => ({
                        ...item,
                        productividad_promedio: item.count > 0 ? item.productividad / item.count : 0,
                        periodos_trabajados: item.periodos.size
                    }))
                    .sort((a, b) => b.productividad_promedio - a.productividad_promedio);
            }, [filteredData, isDaily]);

            // Get unique cargos (from both sources)
            const uniqueCargos = useMemo(() => {
                const cargos = new Set();
                weeklyData.forEach(item => cargos.add(item.cargo));
                dailyData.forEach(item => cargos.add(item.cargo));
                return Array.from(cargos).sort();
            }, [weeklyData, dailyData]);

            // Get unique operarios (filtered by cargo, from both sources)
            const uniqueOperarios = useMemo(() => {
                const allItems = [...weeklyData, ...dailyData];
                const filtered = selectedCargo !== 'Todos' ? allItems.filter(item => item.cargo === selectedCargo) : allItems;
                const ops = new Map();
                filtered.forEach(item => { if (!ops.has(item.nombre)) ops.set(item.nombre, item.nombre); });
                return Array.from(ops.entries()).sort((a, b) => a[1].localeCompare(b[1]));
            }, [weeklyData, dailyData, selectedCargo]);

            const COLORS = ['#0E245E', '#192853', '#10B981', '#5E6373', '#AEAEB8'];

            if (loading) {
                return (
                    <>
                        <Header />
                        <LoadingSkeleton />
                    </>
                );
            }

            return (
                <>
                    <Header />
                    <div className="container">
                        <h1 className="page-title">Productividad ALM</h1>

                        {error && <div className="error-message">{error}</div>}

                        {/* Filters Bar */}
                        <div className="filters-bar">
                            <div className="filter-group">
                                <label>Desde</label>
                                <input
                                    type="date"
                                    value={dateFrom}
                                    onChange={(e) => {
                                        setDateFrom(e.target.value);
                                        setCurrentPage(1);
                                    }}
                                />
                            </div>
                            <div className="filter-group">
                                <label>Hasta</label>
                                <input
                                    type="date"
                                    value={dateTo}
                                    onChange={(e) => {
                                        setDateTo(e.target.value);
                                        setCurrentPage(1);
                                    }}
                                />
                            </div>
                            <div className="filter-group">
                                <label>Cargo</label>
                                <select
                                    value={selectedCargo}
                                    onChange={(e) => {
                                        setSelectedCargo(e.target.value);
                                        setSelectedOperario('Todos');
                                        setCurrentPage(1);
                                    }}
                                >
                                    <option value="Todos">Todos</option>
                                    {uniqueCargos.map(cargo => (
                                        <option key={cargo} value={cargo}>{cargo}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="filter-group">
                                <label>Operario</label>
                                <select
                                    value={selectedOperario}
                                    onChange={(e) => {
                                        const op = e.target.value;
                                        setSelectedOperario(op);
                                        setCurrentPage(1);
                                        // Si seleccionó un operario, expandir fechas a todo su rango
                                        if (op !== 'Todos') {
                                            const allDates = [];
                                            dailyData.filter(d => d.nombre === op).forEach(d => allDates.push(d.dia));
                                            weeklyData.filter(d => d.nombre === op).forEach(d => allDates.push(weekToDate(d.anio, d.semana)));
                                            allDates.sort();
                                            if (allDates.length > 0) {
                                                setDateFrom(allDates[0]);
                                                setDateTo(allDates[allDates.length - 1]);
                                            }
                                        }
                                    }}
                                >
                                    <option value="Todos">Todos</option>
                                    {uniqueOperarios.map(([usuario, nombre]) => (
                                        <option key={usuario} value={usuario}>{nombre}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="filter-group">
                                <label>Vista por Periodo</label>
                                <select
                                    value={periodView}
                                    onChange={(e) => {
                                        const newView = e.target.value;
                                        setPeriodView(newView);
                                        setCurrentPage(1);
                                        if (newView === 'Diario') {
                                            const hoy = new Date().toISOString().split('T')[0];
                                            setDateFrom(hoy);
                                            setDateTo(hoy);
                                        } else {
                                            // Restaurar rango completo para semanal/mensual
                                            const allDates = [];
                                            weeklyData.forEach(d => allDates.push(weekToDate(d.anio, d.semana)));
                                            dailyData.forEach(d => allDates.push(d.dia));
                                            allDates.sort();
                                            if (allDates.length > 0) {
                                                setDateFrom(allDates[0]);
                                                setDateTo(allDates[allDates.length - 1]);
                                            }
                                        }
                                    }}
                                >
                                    <option value="Diario">Diario</option>
                                    <option value="Semanal">Semanal</option>
                                    <option value="Mensual">Mensual</option>
                                </select>
                            </div>
                            {isDaily && (
                                <div className="filter-group" style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', paddingTop: '1.4rem' }}>
                                    <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', fontSize: '0.85rem', whiteSpace: 'nowrap' }}>
                                        <input
                                            type="checkbox"
                                            checked={excludeWeekends}
                                            onChange={(e) => {
                                                setExcludeWeekends(e.target.checked);
                                                setCurrentPage(1);
                                            }}
                                            style={{ width: '16px', height: '16px', cursor: 'pointer', accentColor: '#192853' }}
                                        />
                                        Excluir Sab/Dom
                                    </label>
                                </div>
                            )}
                            <button className="btn-apply">Aplicar Filtros</button>
                            <button
                                onClick={handleRecalculate}
                                disabled={recalculating}
                                style={{
                                    padding: '0.6rem 1.2rem',
                                    backgroundColor: recalculating ? '#9CA3AF' : '#10B981',
                                    color: '#fff',
                                    border: 'none',
                                    borderRadius: '8px',
                                    fontWeight: 600,
                                    fontSize: '0.85rem',
                                    cursor: recalculating ? 'not-allowed' : 'pointer',
                                    display: 'flex',
                                    alignItems: 'center',
                                    gap: '0.4rem',
                                    whiteSpace: 'nowrap',
                                    transition: 'background-color 0.3s ease'
                                }}
                            >
                                {recalculating ? 'Recalculando...' : 'Recalcular Productividad'}
                            </button>
                        </div>

                        {/* KPI Cards */}
                        <div className="kpi-section">
                            <KPICard
                                label="Promedio Pallets/Hora"
                                value={formatChileanNumber(kpis.avgProductivity)}
                                subtitle="Promedio general"
                            />
                            <KPICard
                                label="Operarios"
                                value={kpis.activeOperators}
                                subtitle="En periodo seleccionado"
                            />
                            <KPICard
                                label={isDaily ? "Dias con Data" : "Semanas con Data"}
                                value={kpis.periodCount}
                                subtitle={isDaily ? "Dias registrados" : "Semanas registradas"}
                            />
                            <KPICard
                                label="Registros"
                                value={filteredData.length.toLocaleString('es-CL')}
                                subtitle="Datos filtrados"
                            />
                        </div>

                        {/* Charts */}
                        {filteredData.length > 0 ? (
                            <>
                            {/* Tendencia General - Full Width */}
                            <div className="chart-card" style={{ marginBottom: '2rem' }}>
                                <h3 className="chart-title">Tendencia de Productividad General</h3>
                                <div className="chart-container-large">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={tendenciaData} margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#AEAEB8" />
                                            <XAxis dataKey="fecha" stroke="#5E6373" />
                                            <YAxis stroke="#5E6373" />
                                            <Tooltip contentStyle={{ backgroundColor: '#FFFEFF', border: '1px solid #AEAEB8', borderRadius: '8px' }} />
                                            <ReferenceLine y={30} stroke="#EF4444" strokeWidth={2} strokeDasharray="8 4"
                                                label={{ value: 'Meta 30', position: 'right', fill: '#EF4444', fontWeight: 600, fontSize: 12 }} />
                                            <Line type="monotone" dataKey="Pallets/Hora" stroke="#0E245E"
                                                dot={{ fill: '#10B981', r: 4 }} activeDot={{ r: 6 }} strokeWidth={2} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            {/* Tendencia por Cargo - Full Width */}
                            <div className="chart-card" style={{ marginBottom: '2rem' }}>
                                <h3 className="chart-title">Tendencia por Cargo</h3>
                                <div className="chart-container-large">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={tendenciaCargoData.data} margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                            <CartesianGrid strokeDasharray="3 3" stroke="#AEAEB8" />
                                            <XAxis dataKey="fecha" stroke="#5E6373" />
                                            <YAxis stroke="#5E6373" />
                                            <Tooltip contentStyle={{ backgroundColor: '#FFFEFF', border: '1px solid #AEAEB8', borderRadius: '8px' }} />
                                            <Legend />
                                            <ReferenceLine y={30} stroke="#EF4444" strokeWidth={2} strokeDasharray="8 4"
                                                label={{ value: 'Meta 30', position: 'right', fill: '#EF4444', fontWeight: 600, fontSize: 12 }} />
                                            {tendenciaCargoData.cargos.map((cargo, i) => (
                                                <Line key={cargo} type="monotone" dataKey={cargo}
                                                    stroke={CARGO_COLORS[i % CARGO_COLORS.length]}
                                                    dot={{ r: 3 }} activeDot={{ r: 5 }} strokeWidth={2} connectNulls />
                                            ))}
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            </>
                        ) : (
                            <div className="no-data">
                                <div className="no-data-icon">📊</div>
                                <p>No hay datos disponibles para los filtros seleccionados</p>
                            </div>
                        )}

                        {/* Ranking Table */}
                        {rankingData.length > 0 && (
                            <RankingTable
                                data={rankingData}
                                currentPage={currentPage}
                                itemsPerPage={5}
                                onPageChange={setCurrentPage}
                                searchTerm={searchTerm}
                                onSearchChange={setSearchTerm}
                                isDaily={isDaily}
                            />
                        )}

                        <div style={{ height: '2rem' }}></div>
                    </div>
                </>
            );
        };

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>
