// ========== HELPERS ==========
const fmt = (n) => new Intl.NumberFormat('es-CL').format(n);
const fmtDec = (n) => new Intl.NumberFormat('es-CL',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmtDate = (d) => {
  const dt = new Date(d + 'T12:00:00');
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `${dias[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}`;
};
const fmtDateShort = (d) => {
  const dt = new Date(d + 'T12:00:00');
  return `${dt.getDate()}/${dt.getMonth()+1}`;
};

// ========== COMPONENTS ==========
const KPICard = ({label, value, icon, trend, trendLabel, color="#192853"}) => (
  <div style={{background:'#fff',borderRadius:12,padding:'20px 24px',border:'1px solid #F1F5F9',boxShadow:'0 1px 2px rgba(0,0,0,0.04)'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <span style={{fontSize:13,fontWeight:500,color:'#5E6373'}}>{label}</span>
      <span style={{color:'#AEAEB8'}}>{icon}</span>
    </div>
    <div className="tabular-nums" style={{fontSize:32,fontWeight:700,color,lineHeight:1.1}}>{value}</div>
    {trend !== undefined && (
      <div style={{display:'flex',alignItems:'center',marginTop:8,fontSize:13}}>
        {trend >= 0 ? <Icon name="arrowUp" size={16} color="#10B981"/> : <Icon name="arrowDown" size={16} color="#EF4444"/>}
        <span style={{color:trend>=0?'#10B981':'#EF4444',fontWeight:500,marginLeft:2}}>{trend>=0?'+':''}{fmtDec(trend)}%</span>
        <span style={{color:'#AEAEB8',marginLeft:8}}>{trendLabel}</span>
      </div>
    )}
  </div>
);

const Badge = ({children, color="#192853"}) => (
  <span style={{display:'inline-block',padding:'2px 10px',borderRadius:20,fontSize:11,fontWeight:600,background:color+'18',color,whiteSpace:'nowrap'}}>{children}</span>
);

const cargoColor = (c) => {
  if(c.includes('DOBLE')) return '#192853';
  if(c.includes('GRÚA')||c.includes('GRUA')) return '#0E245E';
  if(c.includes('APILADOR')) return '#5E6373';
  if(c.includes('TRANSPALETA')) return '#94A3B8';
  return '#AEAEB8';
};

// ========== MAIN APP ==========
function App() {
  const [view, setView] = useState('general');
  const [selectedOp, setSelectedOp] = useState(null);
  const [cargoFilter, setCargoFilter] = useState('TODOS');

  const filteredRanking = useMemo(() => {
    if(cargoFilter === 'TODOS') return RANKING;
    return RANKING.filter(r => r.cargo === cargoFilter);
  }, [cargoFilter]);

  const chartData = DAILY_DATA.map(d => ({...d, label: fmtDateShort(d.dia)}));

  // Weekly average for comparison
  const lastWeek = DAILY_DATA.slice(-5);
  const prevWeek = DAILY_DATA.slice(-10,-5);
  const avgLast = lastWeek.reduce((s,d)=>s+d.avg_prod,0)/lastWeek.length;
  const avgPrev = prevWeek.length ? prevWeek.reduce((s,d)=>s+d.avg_prod,0)/prevWeek.length : avgLast;
  const trendProd = ((avgLast - avgPrev) / avgPrev * 100);

  const totalMov = DAILY_DATA.reduce((s,d)=>s+d.total_mov, 0);
  const avgProd = DAILY_DATA.reduce((s,d)=>s+d.avg_prod, 0) / DAILY_DATA.length;

  return (
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <div style={{background:'#010B24',color:'#fff',padding:'16px 32px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:16}}>

          <div>
            <div style={{fontSize:20,fontWeight:700,letterSpacing:'-0.02em'}}>Trailer Logistics</div>
            <div style={{fontSize:12,color:'#94A3B8',fontWeight:400}}>Panel de Productividad Operarios</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8}}>
          {['general','detalle','ranking'].map(v => (
            <button key={v} onClick={()=>setView(v)} style={{
              padding:'8px 20px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
              background:view===v?'#192853':'transparent',color:view===v?'#fff':'#94A3B8',
              transition:'all 0.15s'
            }}>{v==='general'?'Vista General':v==='detalle'?'Detalle Diario':'Ranking'}</button>
          ))}
        </div>
        <div style={{fontSize:13,color:'#94A3B8'}}>Feb — Mar 2026</div>
      </div>

      <div style={{padding:'24px 32px',maxWidth:1400,margin:'0 auto'}}>

        {/* ========== VISTA GENERAL ========== */}
        {view === 'general' && <>
          {/* KPI CARDS */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,marginBottom:24}}>
            <KPICard
              label="Operarios Activos"
              value={13}
              icon={<Icon name="users" size={20}/>}
            />
            <KPICard
              label="Productividad Promedio"
              value={`${fmtDec(avgProd)} mov/hr`}
              icon={<Icon name="activity" size={20}/>}
              trend={trendProd}
              trendLabel="vs semana anterior"
            />
            <KPICard
              label="Total Movimientos"
              value={fmt(totalMov)}
              icon={<Icon name="box" size={20}/>}
            />
            <KPICard
              label="Mejor Operario"
              value="Pedro López"
              icon={<Icon name="trophy" size={20}/>}
              color="#10B981"
            />
          </div>

          {/* CHARTS ROW */}
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:24}}>
            {/* Line chart - Productividad diaria */}
            <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9'}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Productividad Diaria Promedio</div>
              <div style={{fontSize:13,color:'#5E6373',marginBottom:20}}>Movimientos/hora promedio del equipo</div>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={chartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" opacity={0.6}/>
                  <XAxis dataKey="label" tick={{fontSize:11,fill:'#64748B'}}/>
                  <YAxis tick={{fontSize:11,fill:'#64748B'}} domain={[0,'auto']}/>
                  <Tooltip
                    contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}}
                    formatter={(v) => [fmtDec(v) + ' mov/hr', 'Productividad']}
                    labelFormatter={(l) => `Día ${l}`}
                  />
                  <Line type="monotone" dataKey="avg_prod" stroke="#192853" strokeWidth={2.5} dot={{r:4,fill:'#192853'}} activeDot={{r:6}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>

            {/* Bar chart - Por cargo */}
            <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9'}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Productividad por Cargo</div>
              <div style={{fontSize:13,color:'#5E6373',marginBottom:20}}>Promedio mov/hr por tipo de operario</div>
              <ResponsiveContainer width="100%" height={280}>
                <BarChart data={BY_CARGO} layout="vertical">

                  <YAxis type="category" dataKey="cargo" tick={{fontSize:11,fill:'#64748B'}} width={110}/>

              <ResponsiveContainer width="100%" height={250}>
                <BarChart data={chartData}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" opacity={0.6}/>
                  <XAxis dataKey="label" tick={{fontSize:11,fill:'#64748B'}}/>
                  <YAxis tick={{fontSize:11,fill:'#64748B'}}/>
                  <Tooltip
                    contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}}
                    formatter={(v) => [fmt(v) + ' mov', 'Total']}
                  />
                  <Bar dataKey="total_mov" fill="#192853" radius={[4,4,0,0]} barSize={28}/>
                </BarChart>
              </ResponsiveContainer>
            </div>

            {/* Distribution pie */}
            <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9'}}>
              <div style={{fontSize:16,fontWeight:600,marginBottom:4}}>Distribución de Movimientos</div>
              <div style={{fontSize:13,color:'#5E6373',marginBottom:20}}>Participación por tipo de cargo</div>
              <div style={{display:'flex',alignItems:'center',gap:16}}>
                <ResponsiveContainer width="55%" height={250}>
                  <PieChart>
                    <Pie data={BY_CARGO} dataKey="total_mov" nameKey="cargo" cx="50%" cy="50%" outerRadius={90} innerRadius={55}>
                      {BY_CARGO.map((e,i) => <Cell key={i} fill={e.color}/>)}

                    <Tooltip
                      contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}}
                      formatter={(v) => [fmt(v) + ' mov']}
                    />
                  </PieChart>
                </ResponsiveContainer>
                <div style={{fontSize:13}}>
                  {BY_CARGO.map((c,i) => (
                    <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                      <div style={{width:12,height:12,borderRadius:3,background:c.color,flexShrink:0}}/>
                      <div>
                        <div style={{fontWeight:500}}>{c.cargo}</div>
                        <div style={{color:'#5E6373',fontSize:12}}>{fmt(c.total_mov)} mov · {c.operarios} ops</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </>}

        {/* ========== VISTA RANKING ========== */}
        {view === 'ranking' && <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div>
              <div style={{fontSize:20,fontWeight:700}}>Ranking de Productividad</div>
              <div style={{fontSize:14,color:'#5E6373'}}>Período Feb — Mar 2026 · Ordenado por productividad promedio</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              {['TODOS','OP. GRÚA DOBLE','OP. GRÚA','OP. APILADOR','OP. TRANSPALETA','RECEPCIONISTA'].map(c => (
                <button key={c} onClick={()=>setCargoFilter(c)} style={{
                  padding:'6px 14px',borderRadius:6,border:'1px solid #E2E8F0',cursor:'pointer',fontSize:12,fontWeight:500,
                  background:cargoFilter===c?'#192853':'#fff',color:cargoFilter===c?'#fff':'#5E6373',
                  transition:'all 0.15s'
                }}>{c === 'TODOS' ? 'Todos' : c}</button>
              ))}
            </div>
          </div>

          <div style={{background:'#fff',borderRadius:12,border:'1px solid #F1F5F9',overflow:'hidden'}}>
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr style={{borderBottom:'1px solid #F1F5F9'}}>
                  {['#','Operario','Cargo','Productividad','Mov. Totales','Mov. Cajas','Mov. Destino','Días'].map((h,i) => (
                    <th key={i} style={{padding:'14px 16px',fontSize:12,fontWeight:600,color:'#5E6373',textAlign:i>=3?'right':'left',textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filteredRanking.map((r,i) => (
                  <tr key={r.usuario} style={{borderBottom:'1px solid #F8FAFC',cursor:'pointer',transition:'background 0.1s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                    onClick={()=>{setSelectedOp(r.usuario);setView('detalle');}}>
                    <td style={{padding:'14px 16px',fontSize:14,fontWeight:700,color:i<3?'#192853':'#5E6373',width:40}}>
                      {i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}
                    </td>
                    <td style={{padding:'14px 16px'}}>
                      <div style={{fontWeight:600,fontSize:14}}>{r.nombre}</div>
                      <div style={{fontSize:12,color:'#AEAEB8'}}>{r.usuario}</div>
                    </td>
                    <td style={{padding:'14px 16px'}}><Badge color={cargoColor(r.cargo)}>{r.cargo}</Badge></td>
                    <td className="tabular-nums" style={{padding:'14px 16px',textAlign:'right',fontSize:18,fontWeight:700,color:'#192853'}}>{fmtDec(r.prod)}</td>
                    <td className="tabular-nums" style={{padding:'14px 16px',textAlign:'right',fontSize:14,fontWeight:500}}>{fmt(r.total_mov)}</td>
                    <td className="tabular-nums" style={{padding:'14px 16px',textAlign:'right',fontSize:14,color:'#5E6373'}}>{fmt(r.cajas)}</td>
                    <td className="tabular-nums" style={{padding:'14px 16px',textAlign:'right',fontSize:14,color:'#5E6373'}}>{fmt(r.destino)}</td>
                    <td className="tabular-nums" style={{padding:'14px 16px',textAlign:'right',fontSize:14,color:'#5E6373'}}>{r.dias}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Bar chart ranking */}
          <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9',marginTop:20}}>
            <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Comparativo de Productividad</div>
            <ResponsiveContainer width="100%" height={380}>
              <BarChart data={filteredRanking} layout="vertical">
                <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" opacity={0.6} horizontal={false}/>
                <XAxis type="number" tick={{fontSize:11,fill:'#64748B'}}/>
                <YAxis type="category" dataKey="nombre" tick={{fontSize:12,fill:'#64748B'}} width={140}/>
                <Tooltip
                  contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}}
                  formatter={(v) => [fmtDec(v) + ' mov/hr', 'Productividad']}
                />
                <Bar dataKey="prod" radius={[0,6,6,0]} barSize={22}>
                  {filteredRanking.map((e,i) => <Cell key={i} fill={cargoColor(e.cargo)}/>)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </>}

        {/* ========== VISTA DETALLE ========== */}
        {view === 'detalle' && <>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
            <div>
              <div style={{fontSize:20,fontWeight:700}}>Detalle Diario por Operario</div>
              <div style={{fontSize:14,color:'#5E6373'}}>Selecciona un operario para ver su evolución diaria</div>
            </div>
          </div>

          <div style={{display:'flex',gap:12,flexWrap:'wrap',marginBottom:20}}>
            {RANKING.map(r => (
              <button key={r.usuario} onClick={()=>setSelectedOp(r.usuario)} style={{
                padding:'8px 16px',borderRadius:8,border:'1px solid #E2E8F0',cursor:'pointer',fontSize:13,fontWeight:500,
                background:selectedOp===r.usuario?'#192853':'#fff',color:selectedOp===r.usuario?'#fff':'#5E6373',
                transition:'all 0.15s'
              }}>{r.nombre}</button>
            ))}
          </div>

          {selectedOp && (() => {
            const opData = DETAIL_DATA.filter(d => d.usuario === selectedOp);
            const opInfo = RANKING.find(r => r.usuario === selectedOp);
            if(!opInfo) return <div style={{padding:40,textAlign:'center',color:'#5E6373'}}>Sin datos detallados disponibles para este operario</div>;

            const chartDataOp = opData.map(d => ({...d, label: fmtDateShort(d.dia)}));

            return <>
              {/* KPI cards for selected operator */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:20}}>
                <KPICard label="Productividad Promedio" value={`${fmtDec(opInfo.prod)} mov/hr`} icon={<Icon name="activity" size={18}/>} color="#192853"/>
                <KPICard label="Total Movimientos" value={fmt(opInfo.total_mov)} icon={<Icon name="box" size={18}/>}/>
                <KPICard label="Mov. Cajas" value={fmt(opInfo.cajas)} icon={<Icon name="box" size={18}/>} color="#0E245E"/>
                <KPICard label="Mov. Destino" value={fmt(opInfo.destino)} icon={<Icon name="box" size={18}/>} color="#5E6373"/>
              </div>

              {opData.length > 0 ? (
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
                  <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9'}}>
                    <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Evolución de Productividad</div>
                    <ResponsiveContainer width="100%" height={280}>
                      <LineChart data={chartDataOp}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" opacity={0.6}/>
                        <XAxis dataKey="label" tick={{fontSize:11,fill:'#64748B'}}/>
                        <YAxis tick={{fontSize:11,fill:'#64748B'}}/>
                        <Tooltip
                          contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}}
                          formatter={(v) => [fmtDec(v) + ' mov/hr']}
                        />
                        <Line type="monotone" dataKey="prod" stroke="#192853" strokeWidth={2.5} dot={{r:4,fill:'#192853'}} activeDot={{r:6}} name="Productividad"/>
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  <div style={{background:'#fff',borderRadius:12,padding:24,border:'1px solid #F1F5F9'}}>
                    <div style={{fontSize:16,fontWeight:600,marginBottom:16}}>Desglose Cajas vs Destino</div>
                    <ResponsiveContainer width="100%" height={280}>
                      <BarChart data={chartDataOp}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#E2E8F0" opacity={0.6}/>
                        <XAxis dataKey="label" tick={{fontSize:11,fill:'#64748B'}}/>
                        <YAxis tick={{fontSize:11,fill:'#64748B'}}/>
                        <Tooltip contentStyle={{borderRadius:8,border:'1px solid #E2E8F0',fontSize:13}} formatter={(v)=>[fmt(v)+' mov']}/>
                        <Legend iconType="circle" wrapperStyle={{fontSize:12}}/>
                        <Bar dataKey="cajas" name="Cajas" fill="#192853" radius={[4,4,0,0]} barSize={18}/>
                        <Bar dataKey="destino" name="Destino" fill="#94A3B8" radius={[4,4,0,0]} barSize={18}/>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              ) : (
                <div style={{background:'#fff',borderRadius:12,padding:40,textAlign:'center',color:'#5E6373',border:'1px solid #F1F5F9'}}>
                  Detalle diario no disponible en la muestra. En producción, estos datos se cargan desde Supabase.
                </div>
              )}
            </>;
          })()}

          {!selectedOp && (
            <div style={{background:'#fff',borderRadius:12,padding:60,textAlign:'center',border:'1px solid #F1F5F9'}}>
              <Icon name="users" size={48} color="#AEAEB8"/>
              <div style={{fontSize:16,fontWeight:600,marginTop:16,color:'#5E6373'}}>Selecciona un operario para ver su detalle</div>
            </div>
          )}
        </>}

      </div>

      {/* FOOTER */}
      <div style={{padding:'16px 32px',borderTop:'1px solid #E2E8F0',textAlign:'center',fontSize:12,color:'#AEAEB8',marginTop:40}}>
        Trailer Logistics · Panel de Productividad · Datos: HISTORIAL CAJAS + HISTORIAL DESTINO · Conectado a Supabase
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
