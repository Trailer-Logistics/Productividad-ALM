<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Productividad ALM | Trailer Logistics</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>

    <!-- PropTypes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

    <!-- Babel Standalone -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.15.0/Recharts.min.js"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F2F2F5;
            color: #192853;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background-color: #192853;
            color: #FFFEFF;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo-box {
            background-color: #0E245E;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.25rem;
            border: 2px solid #10B981;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links li a {
            color: #AEAEB8;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        .nav-links li a:hover {
            color: #FFFEFF;
        }

        .nav-links li a.active {
            color: #10B981;
            border-bottom: 2px solid #10B981;
            padding-bottom: 0.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #AEAEB8;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #10B981;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: #192853;
        }

        /* Filters Bar */
        .filters-bar {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5E6373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input,
        .filter-group select {
            padding: 0.75rem;
            border: 1px solid #AEAEB8;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            color: #192853;
            background-color: #FFFEFF;
            transition: border-color 0.3s ease;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            outline: none;
            border-color: #0E245E;
            box-shadow: 0 0 0 3px rgba(14, 36, 94, 0.1);
        }

        .filter-group input::placeholder {
            color: #AEAEB8;
        }

        .btn-apply {
            padding: 0.75rem 1.5rem;
            background-color: #0E245E;
            color: #FFFEFF;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .btn-apply:hover {
            background-color: #192853;
            transform: translateY(-2px);
        }

        .btn-apply:active {
            transform: translateY(0);
        }

        /* KPI Cards */
        .kpi-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .kpi-card {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #0E245E;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .kpi-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #5E6373;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 700;
            color: #192853;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 0.5rem;
        }

        .kpi-subtitle {
            font-size: 0.8rem;
            color: #AEAEB8;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-card {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #192853;
            margin-bottom: 1rem;
        }

        .chart-container {
            width: 100%;
            height: 300px;
        }

        /* Table */
        .table-section {
            background-color: #FFFEFF;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 2rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-search {
            flex: 1;
            min-width: 200px;
        }

        .table-search input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #AEAEB8;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
        }

        .table-search input:focus {
            outline: none;
            border-color: #0E245E;
            box-shadow: 0 0 0 3px rgba(14, 36, 94, 0.1);
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        .ranking-table thead {
            background-color: #F2F2F5;
            border-bottom: 2px solid #AEAEB8;
        }

        .ranking-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            color: #5E6373;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ranking-table td {
            padding: 1rem;
            border-bottom: 1px solid #F2F2F5;
            font-size: 0.95rem;
            color: #192853;
        }

        .ranking-table tbody tr:nth-child(odd) {
            background-color: #F2F2F5;
        }

        .ranking-table tbody tr:hover {
            background-color: #FFFEFF;
            box-shadow: inset 0 0 0 1px #AEAEB8;
        }

        .rank-number {
            font-weight: 700;
            color: #0E245E;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
        }

        .operator-name {
            font-weight: 600;
            color: #192853;
        }

        .cargo-badge {
            display: inline-block;
            background-color: #0E245E;
            color: #FFFEFF;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .mono-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .pagination button,
        .pagination span {
            padding: 0.5rem 0.75rem;
            border: 1px solid #AEAEB8;
            background-color: #FFFEFF;
            color: #192853;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            transition: background-color 0.3s ease;
        }

        .pagination button:hover:not(:disabled) {
            background-color: #0E245E;
            color: #FFFEFF;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .active {
            background-color: #0E245E;
            color: #FFFEFF;
            border-color: #0E245E;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #F2F2F5 25%, #AEAEB8 50%, #F2F2F5 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-card {
            height: 120px;
            margin-bottom: 1rem;
        }

        .skeleton-chart {
            height: 300px;
            margin-bottom: 2rem;
        }

        /* No Data */
        .no-data {
            text-align: center;
            padding: 2rem;
            color: #AEAEB8;
        }

        .no-data-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .nav-links {
                gap: 1rem;
            }

            .container {
                padding: 0 1rem;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .filters-bar {
                grid-template-columns: 1fr;
            }

            .kpi-section {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .table-header {
                flex-direction: column;
                align-items: stretch;
            }

            .table-search {
                min-width: auto;
            }

            .ranking-table th,
            .ranking-table td {
                padding: 0.75rem 0.5rem;
                font-size: 0.85rem;
            }

            .kpi-value {
                font-size: 1.5rem;
            }
        }

        .error-message {
            background-color: #FEE2E2;
            color: #DC2626;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #DC2626;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Cell } = window.Recharts;

        // Supabase Configuration
        const SUPABASE_URL = 'https://xcmpuyjoidexrgpnotkj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjbXB1eWpvaWRleHJncG5vdGtqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjYxOTQsImV4cCI6MjA4ODc0MjE5NH0.F8QeJldEz8QLBkbtCZ6a78zK27iSDnpgNqtnJLDuWN4';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Utility Functions
        const formatChileanNumber = (num) => {
            return num.toLocaleString('es-CL', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        };

        const formatDate = (dateString) => {
            const date = new Date(dateString);
            return date.toLocaleDateString('es-CL', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });
        };

        // KPI Card Component
        const KPICard = ({ label, value, subtitle }) => (
            <div className="kpi-card">
                <div className="kpi-label">{label}</div>
                <div className="kpi-value">{value}</div>
                {subtitle && <div className="kpi-subtitle">{subtitle}</div>}
            </div>
        );

        // Header Component
        const Header = () => (
            <header className="header">
                <div className="header-left">
                    <div className="logo-box">TL</div>
                    <h1 className="header-title">TRAILER LOGISTICS</h1>
                </div>
                <nav>
                    <ul className="nav-links">
                        <li><a href="index.html">Carga</a></li>
                        <li><a href="dashboard.html" className="active">Dashboard</a></li>
                        <li><a href="operarios.html">Operarios</a></li>
                    </ul>
                </nav>
                <div className="header-right">
                    <div className="connection-status">
                        <span className="status-dot"></span>
                        <span>Conectado</span>
                    </div>
                </div>
            </header>
        );

        // Loading Skeleton Component
        const LoadingSkeleton = () => (
            <div className="container">
                <div style={{ marginBottom: '2rem' }}>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                    <div className="skeleton skeleton-card"></div>
                </div>
                <div style={{ marginBottom: '2rem' }}>
                    <div className="skeleton skeleton-chart"></div>
                    <div className="skeleton skeleton-chart"></div>
                </div>
            </div>
        );

        // Ranking Table Component
        const RankingTable = ({ data, currentPage, itemsPerPage, onPageChange, searchTerm, onSearchChange }) => {
            const filteredData = useMemo(() => {
                return data.filter(item =>
                    item.nombre.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [data, searchTerm]);

            const paginatedData = useMemo(() => {
                const start = (currentPage - 1) * itemsPerPage;
                return filteredData.slice(start, start + itemsPerPage);
            }, [filteredData, currentPage, itemsPerPage]);

            const totalPages = Math.ceil(filteredData.length / itemsPerPage);

            return (
                <div className="table-section">
                    <div className="table-header">
                        <h2 style={{ marginBottom: 0 }}>Ranking de Operarios</h2>
                        <div className="table-search">
                            <input
                                type="text"
                                placeholder="Buscar por nombre..."
                                value={searchTerm}
                                onChange={(e) => {
                                    onSearchChange(e.target.value);
                                    onPageChange(1);
                                }}
                            />
                        </div>
                    </div>

                    {filteredData.length === 0 ? (
                        <div className="no-data">
                            <div className="no-data-icon">📭</div>
                            <p>No hay datos disponibles</p>
                        </div>
                    ) : (
                        <>
                            <table className="ranking-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Operario</th>
                                        <th>Cargo</th>
                                        <th>Total Mov.</th>
                                        <th>Prom. Pallets/Hora</th>
                                        <th>Dias Trab.</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {paginatedData.map((item, idx) => (
                                        <tr key={item.usuario}>
                                            <td><span className="rank-number">{(currentPage - 1) * itemsPerPage + idx + 1}</span></td>
                                            <td><span className="operator-name">{item.nombre}</span></td>
                                            <td><span className="cargo-badge">{item.cargo}</span></td>
                                            <td><span className="mono-value">{item.total_movimientos}</span></td>
                                            <td><span className="mono-value">{formatChileanNumber(item.productividad_promedio)}</span></td>
                                            <td><span className="mono-value">{item.dias_trabajados}</span></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>

                            {totalPages > 1 && (
                                <div className="pagination">
                                    <button
                                        onClick={() => onPageChange(Math.max(1, currentPage - 1))}
                                        disabled={currentPage === 1}
                                    >
                                        ← Anterior
                                    </button>
                                    {Array.from({ length: totalPages }, (_, i) => i + 1).map(page => (
                                        <button
                                            key={page}
                                            onClick={() => onPageChange(page)}
                                            className={page === currentPage ? 'active' : ''}
                                        >
                                            {page}
                                        </button>
                                    ))}
                                    <button
                                        onClick={() => onPageChange(Math.min(totalPages, currentPage + 1))}
                                        disabled={currentPage === totalPages}
                                    >
                                        Siguiente →
                                    </button>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        };

        // Main Dashboard Component
        const Dashboard = () => {
            const [allData, setAllData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [dateFrom, setDateFrom] = useState('');
            const [dateTo, setDateTo] = useState('');
            const [selectedCargo, setSelectedCargo] = useState('Todos');
            const [selectedOperario, setSelectedOperario] = useState('Todos');
            const [periodView, setPeriodView] = useState('Diario');
            const [currentPage, setCurrentPage] = useState(1);
            const [searchTerm, setSearchTerm] = useState('');

            // Fetch Data on Mount
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        setLoading(true);
                        setError(null);

                        let query = supabase
                            .from('3-productividad_final')
                            .select('*')
                            .order('dia', { ascending: true });

                        const { data, error: supabaseError } = await query;

                        if (supabaseError) throw supabaseError;

                        setAllData(data || []);

                        // Set default date range to last 30 days
                        if (data && data.length > 0) {
                            const today = new Date();
                            const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);

                            setDateFrom(thirtyDaysAgo.toISOString().split('T')[0]);
                            setDateTo(today.toISOString().split('T')[0]);
                        }
                    } catch (err) {
                        console.error('Error fetching data:', err);
                        setError('Error al cargar los datos. Por favor, intente nuevamente.');
                    } finally {
                        setLoading(false);
                    }
                };

                fetchData();
            }, []);

            // Filter Data
            const filteredData = useMemo(() => {
                return allData.filter(item => {
                    const itemDate = new Date(item.dia);
                    const fromDate = dateFrom ? new Date(dateFrom) : null;
                    const toDate = dateTo ? new Date(dateTo) : null;

                    if (fromDate && itemDate < fromDate) return false;
                    if (toDate && itemDate > toDate) return false;
                    if (selectedCargo !== 'Todos' && item.cargo !== selectedCargo) return false;
                    if (selectedOperario !== 'Todos' && item.usuario !== selectedOperario) return false;

                    return true;
                });
            }, [allData, dateFrom, dateTo, selectedCargo, selectedOperario]);

            // Calculate KPIs
            const kpis = useMemo(() => {
                if (filteredData.length === 0) {
                    return {
                        avgProductivity: 0,
                        totalMovements: 0,
                        activeOperators: 0,
                        daysWithData: 0
                    };
                }

                const avgProductivity = filteredData.reduce((sum, item) => sum + (item.productividad_hora || 0), 0) / filteredData.length;
                const totalMovements = filteredData.reduce((sum, item) => sum + (item.total_movimientos || 0), 0);
                const activeOperators = new Set(filteredData.map(item => item.usuario)).size;
                const daysWithData = new Set(filteredData.map(item => item.dia)).size;

                return {
                    avgProductivity,
                    totalMovements,
                    activeOperators,
                    daysWithData
                };
            }, [filteredData]);

            // Prepare Chart Data - Tendencia
            const tendenciaData = useMemo(() => {
                const groupedByDate = {};

                filteredData.forEach(item => {
                    if (!groupedByDate[item.dia]) {
                        groupedByDate[item.dia] = {
                            fecha: item.dia,
                            productividad: 0,
                            count: 0
                        };
                    }
                    groupedByDate[item.dia].productividad += item.productividad_hora || 0;
                    groupedByDate[item.dia].count += 1;
                });

                return Object.values(groupedByDate)
                    .map(item => ({
                        fecha: formatDate(item.fecha),
                        'Pallets/Hora': parseFloat((item.productividad / item.count).toFixed(2))
                    }))
                    .sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
            }, [filteredData]);

            // Prepare Chart Data - Por Cargo
            const cargoData = useMemo(() => {
                const groupedByCargo = {};

                filteredData.forEach(item => {
                    if (!groupedByCargo[item.cargo]) {
                        groupedByCargo[item.cargo] = {
                            cargo: item.cargo,
                            productividad: 0,
                            count: 0
                        };
                    }
                    groupedByCargo[item.cargo].productividad += item.productividad_hora || 0;
                    groupedByCargo[item.cargo].count += 1;
                });

                return Object.values(groupedByCargo)
                    .map(item => ({
                        name: item.cargo,
                        'Pallets/Hora': parseFloat((item.productividad / item.count).toFixed(2))
                    }))
                    .sort((a, b) => b['Pallets/Hora'] - a['Pallets/Hora']);
            }, [filteredData]);

            // Prepare Chart Data - Distribucion
            const distribucionData = useMemo(() => {
                const groupedByDate = {};

                filteredData.forEach(item => {
                    if (!groupedByDate[item.dia]) {
                        groupedByDate[item.dia] = {
                            fecha: formatDate(item.dia),
                            'Pallets': 0,
                            'Destino': 0
                        };
                    }
                    groupedByDate[item.dia]['Pallets'] += item.mov_cajas || 0;
                    groupedByDate[item.dia]['Destino'] += item.mov_destino || 0;
                });

                return Object.values(groupedByDate)
                    .sort((a, b) => new Date(a.fecha) - new Date(b.fecha))
                    .slice(-20);
            }, [filteredData]);

            // Prepare Ranking Data
            const rankingData = useMemo(() => {
                const groupedByOperator = {};

                filteredData.forEach(item => {
                    if (!groupedByOperator[item.usuario]) {
                        groupedByOperator[item.usuario] = {
                            usuario: item.usuario,
                            nombre: item.nombre,
                            cargo: item.cargo,
                            productividad: 0,
                            total_movimientos: 0,
                            dias: new Set(),
                            count: 0
                        };
                    }
                    groupedByOperator[item.usuario].productividad += item.productividad_hora || 0;
                    groupedByOperator[item.usuario].total_movimientos += item.total_movimientos || 0;
                    groupedByOperator[item.usuario].dias.add(item.dia);
                    groupedByOperator[item.usuario].count += 1;
                });

                return Object.values(groupedByOperator)
                    .map(item => ({
                        ...item,
                        productividad_promedio: item.count > 0 ? item.productividad / item.count : 0,
                        dias_trabajados: item.dias.size
                    }))
                    .sort((a, b) => b.productividad_promedio - a.productividad_promedio);
            }, [filteredData]);

            // Get unique cargos
            const uniqueCargos = useMemo(() => {
                const cargos = new Set(allData.map(item => item.cargo));
                return Array.from(cargos).sort();
            }, [allData]);

            // Get unique operarios (filtered by selected cargo)
            const uniqueOperarios = useMemo(() => {
                const filtered = selectedCargo !== 'Todos'
                    ? allData.filter(item => item.cargo === selectedCargo)
                    : allData;
                const ops = new Map();
                filtered.forEach(item => {
                    if (!ops.has(item.usuario)) {
                        ops.set(item.usuario, item.nombre || item.usuario);
                    }
                });
                return Array.from(ops.entries()).sort((a, b) => a[1].localeCompare(b[1]));
            }, [allData, selectedCargo]);

            const COLORS = ['#0E245E', '#192853', '#10B981', '#5E6373', '#AEAEB8'];

            if (loading) {
                return (
                    <>
                        <Header />
                        <LoadingSkeleton />
                    </>
                );
            }

            return (
                <>
                    <Header />
                    <div className="container">
                        <h1 className="page-title">Productividad ALM</h1>

                        {error && <div className="error-message">{error}</div>}

                        {/* Filters Bar */}
                        <div className="filters-bar">
                            <div className="filter-group">
                                <label>Desde</label>
                                <input
                                    type="date"
                                    value={dateFrom}
                                    onChange={(e) => {
                                        setDateFrom(e.target.value);
                                        setCurrentPage(1);
                                    }}
                                />
                            </div>
                            <div className="filter-group">
                                <label>Hasta</label>
                                <input
                                    type="date"
                                    value={dateTo}
                                    onChange={(e) => {
                                        setDateTo(e.target.value);
                                        setCurrentPage(1);
                                    }}
                                />
                            </div>
                            <div className="filter-group">
                                <label>Cargo</label>
                                <select
                                    value={selectedCargo}
                                    onChange={(e) => {
                                        setSelectedCargo(e.target.value);
                                        setSelectedOperario('Todos');
                                        setCurrentPage(1);
                                    }}
                                >
                                    <option value="Todos">Todos</option>
                                    {uniqueCargos.map(cargo => (
                                        <option key={cargo} value={cargo}>{cargo}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="filter-group">
                                <label>Operario</label>
                                <select
                                    value={selectedOperario}
                                    onChange={(e) => {
                                        setSelectedOperario(e.target.value);
                                        setCurrentPage(1);
                                    }}
                                >
                                    <option value="Todos">Todos</option>
                                    {uniqueOperarios.map(([usuario, nombre]) => (
                                        <option key={usuario} value={usuario}>{nombre}</option>
                                    ))}
                                </select>
                            </div>
                            <div className="filter-group">
                                <label>Vista por Periodo</label>
                                <select
                                    value={periodView}
                                    onChange={(e) => setPeriodView(e.target.value)}
                                >
                                    <option value="Diario">Diario</option>
                                    <option value="Semanal">Semanal</option>
                                    <option value="Mensual">Mensual</option>
                                </select>
                            </div>
                            <button className="btn-apply">Aplicar Filtros</button>
                        </div>

                        {/* KPI Cards */}
                        <div className="kpi-section">
                            <KPICard
                                label="Promedio Pallets/Hora"
                                value={formatChileanNumber(kpis.avgProductivity)}
                                subtitle="Promedio general"
                            />
                            <KPICard
                                label="Total Movimientos"
                                value={kpis.totalMovements.toLocaleString('es-CL')}
                                subtitle="Periodo seleccionado"
                            />
                            <KPICard
                                label="Operarios Activos"
                                value={kpis.activeOperators}
                                subtitle="Operarios únicos"
                            />
                            <KPICard
                                label="Dias con Data"
                                value={kpis.daysWithData}
                                subtitle="Dias registrados"
                            />
                        </div>

                        {/* Charts */}
                        {filteredData.length > 0 ? (
                            <div className="charts-grid">
                                {/* Tendencia Chart */}
                                <div className="chart-card">
                                    <h3 className="chart-title">Tendencia de Productividad</h3>
                                    <div className="chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={tendenciaData} margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#AEAEB8" />
                                                <XAxis dataKey="fecha" stroke="#5E6373" />
                                                <YAxis stroke="#5E6373" />
                                                <Tooltip
                                                    contentStyle={{
                                                        backgroundColor: '#FFFEFF',
                                                        border: '1px solid #AEAEB8',
                                                        borderRadius: '8px'
                                                    }}
                                                />
                                                <Line
                                                    type="monotone"
                                                    dataKey="Pallets/Hora"
                                                    stroke="#0E245E"
                                                    dot={{ fill: '#10B981', r: 4 }}
                                                    activeDot={{ r: 6 }}
                                                    strokeWidth={2}
                                                />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Cargo Chart */}
                                <div className="chart-card">
                                    <h3 className="chart-title">Productividad por Cargo</h3>
                                    <div className="chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={cargoData} layout="vertical" margin={{ top: 5, right: 30, left: 150, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#AEAEB8" />
                                                <XAxis type="number" stroke="#5E6373" />
                                                <YAxis type="category" dataKey="name" stroke="#5E6373" width={140} />
                                                <Tooltip
                                                    contentStyle={{
                                                        backgroundColor: '#FFFEFF',
                                                        border: '1px solid #AEAEB8',
                                                        borderRadius: '8px'
                                                    }}
                                                />
                                                <Bar dataKey="Pallets/Hora" fill="#0E245E" radius={[0, 8, 8, 0]}>
                                                    {cargoData.map((entry, index) => (
                                                        <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                    ))}
                                                </Bar>
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Distribucion Chart */}
                                <div className="chart-card" style={{ gridColumn: 'span 1' }}>
                                    <h3 className="chart-title">Distribución de Movimientos</h3>
                                    <div className="chart-container">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={distribucionData} margin={{ top: 5, right: 30, left: 0, bottom: 5 }}>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#AEAEB8" />
                                                <XAxis dataKey="fecha" stroke="#5E6373" angle={-45} textAnchor="end" height={80} />
                                                <YAxis stroke="#5E6373" />
                                                <Tooltip
                                                    contentStyle={{
                                                        backgroundColor: '#FFFEFF',
                                                        border: '1px solid #AEAEB8',
                                                        borderRadius: '8px'
                                                    }}
                                                />
                                                <Legend />
                                                <Bar dataKey="Pallets" stackId="a" fill="#0E245E" />
                                                <Bar dataKey="Destino" stackId="a" fill="#10B981" />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="no-data">
                                <div className="no-data-icon">📊</div>
                                <p>No hay datos disponibles para los filtros seleccionados</p>
                            </div>
                        )}

                        {/* Ranking Table */}
                        {rankingData.length > 0 && (
                            <RankingTable
                                data={rankingData}
                                currentPage={currentPage}
                                itemsPerPage={10}
                                onPageChange={setCurrentPage}
                                searchTerm={searchTerm}
                                onSearchChange={setSearchTerm}
                            />
                        )}

                        <div style={{ height: '2rem' }}></div>
                    </div>
                </>
            );
        };

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>
