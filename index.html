<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Datos - Productividad | Trailer Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #192853; --royal: #0E245E; --midnight: #010B24;
            --white: #FFFEFF; --ice-grey: #F2F2F5; --silver: #AEAEB8;
            --slate: #5E6373; --charcoal: #212621;
            --success: #1B8A4A; --error: #C93535; --warning: #D4860B;
        }
        body { font-family: 'Montserrat', Arial, sans-serif; background: var(--ice-grey); color: #000; min-height: 100vh; }

        /* Header */
        .header { background: var(--midnight); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo { width: 40px; height: 40px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 18px; }
        .header h1 { color: var(--white); font-size: 16px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .header-status { display: flex; align-items: center; gap: 8px; color: var(--silver); font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
        .status-dot.disconnected { background: var(--error); }

        .main { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
        .page-title { font-size: 28px; font-weight: 700; color: #000; margin-bottom: 4px; }
        .page-subtitle { color: var(--slate); font-size: 14px; margin-bottom: 32px; }

        /* Upload Cards */
        .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        @media (max-width: 700px) { .upload-grid { grid-template-columns: 1fr; } }

        .upload-card {
            background: var(--white); border-radius: 12px; border: 2px dashed var(--silver);
            padding: 32px 24px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .upload-card:hover { border-color: var(--navy); background: #f8f8fb; }
        .upload-card.dragover { border-color: var(--navy); background: rgba(25,40,83,0.05); }
        .upload-card.has-file { border-style: solid; border-color: var(--success); background: #f0faf4; }

        .card-icon { width: 52px; height: 52px; margin: 0 auto 14px; background: var(--ice-grey); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .card-icon svg { width: 26px; height: 26px; color: var(--navy); }
        .has-file .card-icon { background: rgba(27,138,74,0.1); }
        .has-file .card-icon svg { color: var(--success); }

        .card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate); margin-bottom: 4px; }
        .card-title { font-size: 17px; font-weight: 700; color: #000; margin-bottom: 8px; }
        .card-desc { font-size: 12px; color: var(--silver); }
        .card-filename { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--success); margin-top: 8px; word-break: break-all; }
        .card-stats { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--navy); margin-top: 4px; }
        .card-stats-label { font-size: 11px; color: var(--slate); }

        .upload-card input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .remove-btn {
            position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
            background: rgba(201,53,53,0.1); border: none; border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; color: var(--error); font-size: 14px; z-index: 2;
        }
        .remove-btn:hover { background: rgba(201,53,53,0.2); }

        /* Semana */
        .semana-section { background: var(--white); border-radius: 12px; padding: 18px 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .semana-section label { font-size: 13px; font-weight: 600; color: #000; white-space: nowrap; }
        .semana-input { font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 8px 12px; border: 1.5px solid var(--silver); border-radius: 8px; outline: none; width: 200px; }
        .semana-input:focus { border-color: var(--navy); }
        .semana-hint { font-size: 11px; color: var(--slate); }

        /* Action */
        .action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .btn-upload {
            background: var(--navy); color: white; border: none; padding: 14px 36px; border-radius: 10px;
            font-family: 'Montserrat', Arial, sans-serif; font-size: 14px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s;
        }
        .btn-upload:hover { background: var(--royal); }
        .btn-upload:disabled { background: var(--silver); cursor: not-allowed; }
        .btn-upload.uploading { background: var(--slate); cursor: wait; }
        .file-count { font-size: 13px; color: var(--slate); }
        .file-count strong { color: var(--navy); font-family: 'JetBrains Mono', monospace; }

        /* Progress */
        .progress-section { background: var(--white); border-radius: 12px; padding: 24px; margin-bottom: 20px; display: none; }
        .progress-section.visible { display: block; }
